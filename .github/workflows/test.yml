name: Test Energy Forecast API

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-api.txt
    
    - name: Test imports
      run: |
        python -c "from src.preprocessor_simple import SimpleDataPreprocessor; print('Preprocessor OK')"
        python -c "from api.main import app; print('API OK')"
    
    - name: Run quick test
      run: python -c "print('All tests passed!')"