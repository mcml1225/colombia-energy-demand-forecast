name: Test Energy Forecast API

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy prophet scikit-learn
          pip install fastapi uvicorn pydantic
          pip install openpyxl xlrd requests beautifulsoup4
      
      - name: Test imports
        run: |
          python -c "from src.preprocessor_simple import SimpleDataPreprocessor; print('Preprocessor OK')"
          python -c "import fastapi; print('FastAPI OK')"
          python -c "import prophet; print('Prophet OK')"
      
      - name: Run quick test
        run: echo "All tests passed!"